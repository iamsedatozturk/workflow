<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>İş Akışı Yönetimi</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>İş Akışı Yönetimi</h1>
      <p>İş kaydı, kriter tablosu, onay-red yönlendirmesi ve akış sonlandırma</p>
    </div>
    <button id="resetDemo" class="ghost">Demo Verisini Yenile</button>
  </header>

  <main>
    <section class="band two-col">
      <div class="panel">
        <div class="panel-head">
          <h2>WorkflowItems Tablosu</h2>
          <span id="workflowCount">0 kayıt</span>
        </div>
        <form id="workflowForm" class="inline-form">
          <label>
            Başlık
            <input name="sorumlu" required placeholder="Örn. Üretim Süreci">
          </label>
          <label>
            Tutar
            <input name="amount" type="number" min="0" step="0.01" required value="7200">
          </label>
          <button type="submit">İş Akışı Başlatma Kaydı</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Id</th>
                <th>Sorumlu</th>
                <th>Tarih</th>
                <th>Tutar</th>
                <th>Durum</th>
                <th>İşlem</th>
              </tr>
            </thead>
            <tbody id="workflowRows"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>Bekleyen Onaylar</h2>
          <span id="pendingCount">0 bekleyen</span>
        </div>
        <div id="pendingList" class="pending-list"></div>
      </div>
    </section>

    <section class="band">
      <div class="panel-head">
        <h2>Tasarımcı</h2>
        <div class="toolbar">
          <button data-kind="Start">Başlat</button>
          <button data-kind="Compare">Karşılaştırma</button>
          <button data-kind="Approval">Onay Kişisi</button>
          <button data-kind="Inform">Bilgilendirme</button>
          <button data-kind="End">Akışı Bitir</button>
        </div>
      </div>

      <div class="designer-layout">
        <div class="flow-canvas" id="flowCanvas">
          <svg id="flowArrows" aria-hidden="true"></svg>
          <div id="flowNodes"></div>
        </div>

        <aside class="editor">
          <h3>Seçili Adım</h3>
          <form id="criteriaForm">
            <input type="hidden" name="id">
            <input type="hidden" name="positionX">
            <input type="hidden" name="positionY">
            <label>
              Tip
              <select name="kind">
                <option>Start</option>
                <option>Compare</option>
                <option>Approval</option>
                <option>Inform</option>
                <option>End</option>
              </select>
            </label>
            <label>
              Başlık
              <input name="title" required>
            </label>
            <div class="rule-fields">
              <label>
                Sütun
                <select name="column">
                  <option>Tutar</option>
                  <option>Id</option>
                </select>
              </label>
              <label>
                Operatör
                <select name="operator">
                  <option>&gt;</option>
                  <option>&gt;=</option>
                  <option>&lt;</option>
                  <option>&lt;=</option>
                  <option>=</option>
                  <option>!=</option>
                </select>
              </label>
              <label>
                Değer
                <input name="compareValue" type="number" step="0.01">
              </label>
            </div>
            <label>
              Onaylayacak kişi
              <input name="approver" placeholder="Örn. Mehmet Yılmaz">
            </label>
            <label>
              Bilgilendirilecek personel
              <input name="informPerson" placeholder="Örn. Muhasebe">
            </label>
            <div class="links-grid">
              <label>Başlat/Sonraki <select name="nextOnStart"></select></label>
              <label>Kriter doğru <select name="nextOnTrue"></select></label>
              <label>Kriter yanlış <select name="nextOnFalse"></select></label>
              <label>Onay verirse <select name="nextOnApprove"></select></label>
              <label>Red ederse <select name="nextOnReject"></select></label>
            </div>
            <div class="form-actions">
              <button type="submit">Kaydet</button>
              <button type="button" id="deleteCriteria" class="danger">Sil</button>
            </div>
          </form>
        </aside>
      </div>
    </section>

    <section class="band">
      <div class="panel-head">
        <h2>Criteria Tablosu</h2>
        <span id="criteriaCount">0 kriter</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Id</th>
              <th>Tip</th>
              <th>Kural/Kişi</th>
              <th>Doğru/Onay</th>
              <th>Yanlış/Red</th>
            </tr>
          </thead>
          <tbody id="criteriaRows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <template id="pendingTemplate">
    <article class="pending-item">
      <div>
        <strong></strong>
        <span></span>
      </div>
      <textarea rows="2" placeholder="Not"></textarea>
      <div class="decision-actions">
        <button class="approve">Onayla</button>
        <button class="reject">Reddet</button>
      </div>
    </article>
  </template>

  <script src="/app.js"></script>
</body>
</html>
